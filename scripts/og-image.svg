<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf7f2"/>
      <stop offset="100%" style="stop-color:#f0ebe1"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#faf9f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1080" cy="80" r="180" fill="#2d6a4f" opacity="0.07"/>
  <circle cx="120" cy="550" r="140" fill="#2d6a4f" opacity="0.06"/>
  <circle cx="1150" cy="580" r="100" fill="#2d6a4f" opacity="0.05"/>

  <!-- Card -->
  <rect x="80" y="80" width="1040" height="470" rx="32" fill="url(#card)" opacity="0.95"
        style="filter:drop-shadow(0 8px 40px rgba(0,0,0,0.10))"/>

  <!-- Green accent bar -->
  <rect x="80" y="80" width="8" height="470" rx="4" fill="#2d6a4f"/>

  <!-- Shamrock icon (simplified) -->
  <g transform="translate(152, 155)">
    <!-- Left leaf -->
    <ellipse cx="-22" cy="-16" rx="20" ry="26" fill="#2d6a4f" transform="rotate(-30,-22,-16)"/>
    <!-- Right leaf -->
    <ellipse cx="22" cy="-16" rx="20" ry="26" fill="#2d6a4f" transform="rotate(30,22,-16)"/>
    <!-- Top leaf -->
    <ellipse cx="0" cy="-38" rx="20" ry="26" fill="#2d6a4f" transform="rotate(0,0,-38)"/>
    <!-- Stem -->
    <rect x="-4" y="8" width="8" height="28" rx="4" fill="#2d6a4f"/>
    <!-- Centre -->
    <circle cx="0" cy="-12" r="10" fill="#2d6a4f"/>
  </g>

  <!-- Site name -->
  <text x="220" y="212" font-family="Georgia, serif" font-size="72" font-weight="700"
        fill="#1a1a1a" letter-spacing="-1">Céilí Sydney</text>

  <!-- Divider -->
  <rect x="220" y="234" width="700" height="3" rx="2" fill="#2d6a4f" opacity="0.25"/>

  <!-- Tagline -->
  <text x="220" y="298" font-family="-apple-system, Helvetica Neue, Arial, sans-serif"
        font-size="34" fill="#444" letter-spacing="0">Rooms, Jobs &amp; More</text>
  <text x="220" y="344" font-family="-apple-system, Helvetica Neue, Arial, sans-serif"
        font-size="34" fill="#444">for Sydney Newcomers</text>

  <!-- Pills row -->
  <rect x="220" y="390" width="120" height="40" rx="20" fill="#2d6a4f" opacity="0.12"/>
  <text x="280" y="415" font-family="-apple-system, sans-serif" font-size="18" fill="#2d6a4f"
        text-anchor="middle" font-weight="600">Rooms</text>

  <rect x="354" y="390" width="96" height="40" rx="20" fill="#2d6a4f" opacity="0.12"/>
  <text x="402" y="415" font-family="-apple-system, sans-serif" font-size="18" fill="#2d6a4f"
        text-anchor="middle" font-weight="600">Jobs</text>

  <rect x="464" y="390" width="140" height="40" rx="20" fill="#2d6a4f" opacity="0.12"/>
  <text x="534" y="415" font-family="-apple-system, sans-serif" font-size="18" fill="#2d6a4f"
        text-anchor="middle" font-weight="600">Events</text>

  <rect x="618" y="390" width="144" height="40" rx="20" fill="#2d6a4f" opacity="0.12"/>
  <text x="690" y="415" font-family="-apple-system, sans-serif" font-size="18" fill="#2d6a4f"
        text-anchor="middle" font-weight="600">Classifieds</text>

  <!-- URL -->
  <text x="220" y="490" font-family="-apple-system, Helvetica Neue, Arial, sans-serif"
        font-size="24" fill="#2d6a4f" font-weight="600" opacity="0.8">ceilisydney.com</text>

  <!-- Sydney Opera House silhouette (simplified) -->
  <g transform="translate(820, 200)" opacity="0.15" fill="#2d6a4f">
    <!-- Shell 1 -->
    <path d="M0,200 Q20,-40 80,0 Q60,80 40,200 Z"/>
    <!-- Shell 2 -->
    <path d="M60,200 Q90,-60 160,0 Q130,80 100,200 Z"/>
    <!-- Shell 3 -->
    <path d="M130,200 Q165,-30 220,20 Q195,90 170,200 Z"/>
    <!-- Base -->
    <rect x="-20" y="198" width="280" height="12" rx="4"/>
  </g>
</svg>
